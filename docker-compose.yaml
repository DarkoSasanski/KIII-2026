services:
  backend:
    image: ${DOCKERHUB_USERNAME}/flask-lab:latest
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: labdb
      DB_USER: admin
      DB_PASSWORD: secret
    depends_on:
      - db

  db:
    image: postgres:16.1
    ports:
      - "54321:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: labdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
